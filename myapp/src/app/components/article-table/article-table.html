
<div class="user-page">
    <h4 class="text-center text-xl font-bold m-5">All users</h4>
    <p-button label="Get" (onClick)="click()" class="flex flex-row justify-center" [disabled]="loadingValue | async" />
    <div class="card m-10 flex justify-center">
        <p-table [value]="utenti" class="w-3xl">
            <ng-template #header>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>email</th>
                </tr>
            </ng-template>
            <ng-template #body let-utente>
               <tr>
                <td>{{ utente.name }}</td>
                <td>{{ utente.username }}</td>
                <td>{{ utente.email }}</td>
               </tr>
            </ng-template>
        </p-table>
    </div>
</div>
