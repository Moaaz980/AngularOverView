
<div class="user-page">
    <h4 class="text-center text-xl font-bold m-5">All users</h4>

    <p-button class="flex flex-row justify-center items-center" label="Get" (onClick)="click()" [disabled]="loadingValue | async" />


    <div class="serach-section flex flex-col items-center justify-center gap-4 mt-9">
            <p-floatlabel>
                <input pInputText id="over_label" [(ngModel)]="username" autocomplete="off" />
                <label for="over_label">Username</label>
            </p-floatlabel>
        <p-button label="Search" (onClick)="onSearch()" [disabled]="username() === '' ? true : false" />
    </div>

    <div class="card m-10 flex justify-center">
        <p-table [value]="utenti()" class="w-3xl">
            <ng-template #header>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>email</th>
                    <th>Details</th>
                </tr>
            </ng-template>
            <ng-template #body let-utente>
               <tr>
                <td>{{ utente.name }}</td>
                <td>{{ utente.username }}</td>
                <td>{{ utente.email }}</td>
                <td>
                    <p-button label="View Details" (onClick)="handleUserViewDetails(utente.id)"/>
                </td>
               </tr>
            </ng-template>
        </p-table>
    </div>
</div>
