<div class="user-page">
    <h4 class="text-center text-xl font-bold mt-2">
        All users
    </h4>

    <p-button class="flex flex-row justify-center items-center" label="Get" (onClick)="click()"
        [disabled]="loadingValue | async" />

    <div class="card flex flex-wrap gap-4 justify-center static top-3 right-3">
        <p-message *ngIf="notFound" severity="error" class="mt-9"
            styleClass="border-l-4 border-red-500 bg-red-50 text-red-700">
            {{ errorMessageVal }}
        </p-message>
    </div>

    <app-search-user [username]="username()" (usernameChange)="username.set($event)" (searchClicked)="onSearch($event)">
    </app-search-user>


    <div class="card m-10 flex justify-center">
        <p-table [value]="utenti()" class="w-3xl">
            <ng-template #header>
                <tr>
                    <th>Name</th>
                    <th>Username</th>
                    <th>email</th>
                    <th>Details</th>
                    <th>Create User</th>
                </tr>
            </ng-template>
            <ng-template #body let-utente>
                <tr>
                    <td>{{ utente.name }}</td>
                    <td>{{ utente.username }}</td>
                    <td>{{ utente.email }}</td>
                    <td>
                        <p-button label="View Details" (onClick)="handleUserViewDetails(utente)" />
                    </td>
                    
                    <td>
                        <p-button label="Create User" />
                    </td>
                </tr>
            </ng-template>
        </p-table>

        <app-user-details [visible]="vis" [selectedUser]="utenteSelezionato" (cancelClicked)="closeModal()">
        </app-user-details>
    </div>
</div>
