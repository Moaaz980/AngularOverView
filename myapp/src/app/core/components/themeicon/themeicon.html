@if (toggled) {
    <i 
        class="pi pi-sun w-fit  px-2 py-2 rounded fixed top-2 right-3 cursor-pointer"
        style="font-size: 1rem;"
        (click)="onClick()"
    >
    </i>
}
@else {
    <i 
        class="pi pi-moon w-fit  px-2 py-2 rounded fixed top-2 right-3 cursor-pointer"
        style="font-size: 1rem;"
        (click)="onClick()"
    >
    </i>
}
